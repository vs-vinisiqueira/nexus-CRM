# Deploy de produção: app (API + UI no mesmo container) + Postgres.
# Uso no VPS:
#   cp .env.prod.example .env   # ajuste a senha do banco e chaves
#   docker compose -f docker-compose.prod.yml up -d --build
#
# A UI e a API ficam em http://SEU_IP:${APP_PORT}. Recomenda-se um proxy reverso
# (nginx/Caddy/Traefik) na frente para TLS/HTTPS.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
    volumes:
      - nexus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nexus}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Sem portas publicadas: o banco só é acessível na rede interna do compose.

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-nexus}
      NODE_ENV: production
      PORT: 3001
      STATIC_DIR: /app/backend/public
      # Chaves opcionais — deixe vazio para cadastrar pela UI em Configurações.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
    ports:
      - "${APP_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  nexus_pgdata:
