services:
  db:
    image: postgres:16-alpine
    container_name: nexus-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexus
    # Host 5433 -> contêiner 5432. Usamos 5433 porque a 5432 pode já estar
    # ocupada por um Postgres nativo na máquina.
    ports:
      - "5433:5432"
    volumes:
      - nexus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nexus_pgdata:
