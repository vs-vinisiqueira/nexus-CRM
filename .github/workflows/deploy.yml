name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Testes (backend smoke + build do front)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nexus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Backend — instala, migra e smoke-test
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/nexus
          PORT: "3001"
        run: |
          npm ci
          npm run migrate
          node src/server.js &
          npm run smoke

      - name: Frontend — instala e builda
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    name: Deploy na VPS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Verifica se a VPS está configurada
        id: check
        run: |
          if [ -n "${{ secrets.VPS_HOST }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Secrets da VPS não configurados — deploy pulado. Veja a seção CI/CD no README."
          fi

      - name: Deploy via SSH (pull + rebuild)
        if: steps.check.outputs.ready == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          PORT="${VPS_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_deploy -p "$PORT" "$VPS_USER@$VPS_HOST" \
            "set -e; cd '$VPS_APP_DIR'; git pull --ff-only origin main; docker compose -f docker-compose.caddy.yml up -d --build; docker image prune -f"
